name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e agent pytest pyyaml

      - name: Run agent tests
        run: |
          cd agent
          PYTHONPATH=src pytest -q

      - name: Validate skill structure
        run: |
          python scripts/validate_skill.py agent/src/wpilib_agent_tools/integrations/codex/skill_bundle

      - name: Smoke checks
        run: |
          bash scripts/smoke.sh
